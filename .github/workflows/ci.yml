name: CI

on:
  push:
    branches: [main, dev, devops-ci, test]
  pull_request:
    branches: [main, dev, devops-ci, test]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npx eslint .
      - run: npm test