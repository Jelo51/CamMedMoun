name: CI

on:
  push:
    branches: [main, dev, devops-ci, test]
  pull_request:
    branches: [main, dev, devops-ci, test]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npx eslint .

      - name: Run tests
        run: npm test